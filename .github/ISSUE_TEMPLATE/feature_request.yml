name: Feature request
description: Suggest a capability or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that interlock makes hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: invariants
    attributes:
      label: Invariant impact
      description: Does this affect any of the five invariants in SECURITY.md? How?
