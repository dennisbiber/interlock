name: Bug report
description: Something doesn't behave as documented.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Include the smallest reproduction you can.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: dropdown
    id: enforcement
    attributes:
      label: Does this touch enforcement?
      description: i.e. could a tool call be allowed that should have been blocked, or vice versa.
      options:
        - "Yes — a call was allowed/blocked incorrectly (security-relevant)"
        - "No — cosmetic / ergonomic / docs"
        - "Not sure"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: OS + Python + Node versions
